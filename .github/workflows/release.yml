# Release workflow — triggers when a version tag (v*) is pushed.
# Also supports manual trigger via workflow_dispatch.
# Builds the project and creates a GitHub Release with the bundled JS file attached.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0). Leave empty to use the latest tag."
        required: false

# Only one release at a time; cancel stale runs if a new tag lands quickly.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

# Required permissions for creating releases and uploading assets.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # ── Node.js setup ────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.1.0
        with:
          node-version: 20
          cache: npm

      # ── Install dependencies ─────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Build ────────────────────────────────────────────────
      - name: Build with esbuild
        run: npm run build

      # ── Create GitHub Release ────────────────────────────────
      - name: Determine release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.ref_name }}" ]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: horizontal-bidirectional-gauge.js
